name: Scrape NanoList

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 aiohttp

      - name: Run NanoList scraper
        run: python scrape_fast.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add startups.json polsia_names.txt
          git diff --staged --quiet || git commit -m "update nanolist $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
