name: Scrape Polsia Live

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 aiohttp

      - name: Run Polsia scraper (single run)
        run: python scrape_polsia_live.py --once

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add startups.json polsia_names.txt
          git diff --staged --quiet || git commit -m "auto: polsia update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
